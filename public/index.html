<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeVector — Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">Code<em>Vector</em></div>
    <span id="count"></span>
  </header>

  <main>

    <div class="filters" id="filters">
      <button class="pill active" data-cat="">All</button>
      <button class="pill" data-cat="Electronics">Electronics</button>
      <button class="pill" data-cat="Clothing">Clothing</button>
      <button class="pill" data-cat="Books">Books</button>
      <button class="pill" data-cat="Home &amp; Garden">Home &amp; Garden</button>
      <button class="pill" data-cat="Sports">Sports</button>
      <button class="pill" data-cat="Toys">Toys</button>
      <button class="pill" data-cat="Food">Food</button>
      <button class="pill" data-cat="Beauty">Beauty</button>
      <button class="pill" data-cat="Automotive">Automotive</button>
      <button class="pill" data-cat="Music">Music</button>
    </div>

    <div id="grid"></div>

    <div class="bottom" id="bottom"></div>

  </main>

  <script src="app.js"></script>

</body>
</html>
